services:
  - type: web
    name: card
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn docgen.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DATABASE_URL
        fromDatabase:
          name: card-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash

databases:
  - name: card-db
    plan: free
    databaseName: card
    user: card
